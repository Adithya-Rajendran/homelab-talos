# Announce LoadBalancer / external IPs on the node L2 (ARP), mirroring the RKE2 setup.
# (Switch to BGP only if a BGP-capable router is introduced.)
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default-l2
spec:
  loadBalancerIPs: true
  externalIPs: true
  interfaces:
    - ^ens18$
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
