# Authentik front door: authentik.alaras.net via the shared gateway
# (mirrors RKE2's authentik.rke.alaras.net -> shared-gateway https).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik
  namespace: authentik
spec:
  hostnames:
    - authentik.alaras.net
  parentRefs:
    - name: shared-gateway
      namespace: gateway
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: authentik-server
          port: 80
