# Declarative Authentik config: OIDC provider + application for Nextcloud.
# Mounted into the WORKER at /blueprints/mounted/cm-authentik-blueprint-nextcloud
# (chart value blueprints.configMaps); authentik watches and re-applies on change.
# The client secret comes from NEXTCLOUD_OIDC_CLIENT_SECRET (sealed into
# authentik-secrets, envFrom'd on both server and worker) — same value sealed as
# nextcloud-stack-sso for the Nextcloud side. THIS is what replaces the manual
# provider/application clicks that were done in the RKE2 authentik UI.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-nextcloud
  namespace: authentik
data:
  nextcloud.yaml: |
    version: 1
    metadata:
      name: nextcloud-oidc
      labels:
        blueprints.goauthentik.io/description: "Nextcloud OIDC provider + application (GitOps-managed)"
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        id: nextcloud-provider
        state: present
        identifiers:
          name: Nextcloud
        attrs:
          name: Nextcloud
          client_type: confidential
          client_id: nextcloud
          client_secret: !Env NEXTCLOUD_OIDC_CLIENT_SECRET
          # REQUIRED in authentik 2026.x: providers declare allowed grant types.
          # UI-created providers default to authorization_code; blueprint-created
          # ones get an EMPTY list -> authorize fails with invalid_request
          # ("Invalid grant_type for provider") and user_oidc shows "Forbidden".
          grant_types:
            - authorization_code
            - refresh_token
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
          redirect_uris:
            - matching_mode: strict
              url: https://cloud.alaras.net/apps/user_oidc/code
            - matching_mode: strict
              url: https://cloud.alaras.net/index.php/apps/user_oidc/code
          sub_mode: user_uuid
          include_claims_in_id_token: true
          access_code_validity: minutes=1
          access_token_validity: hours=1
          refresh_token_validity: days=30
      - model: authentik_core.application
        id: nextcloud-app
        state: present
        identifiers:
          slug: nextcloud
        attrs:
          name: Nextcloud
          slug: nextcloud
          provider: !KeyOf nextcloud-provider
          meta_launch_url: https://cloud.alaras.net/
          policy_engine_mode: any
