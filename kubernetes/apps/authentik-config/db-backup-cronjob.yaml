# Nightly Authentik Postgres dump to NFS — mirrors RKE2's authentik-db-backup
# (there: kubectl-applied out-of-band; here: git). Only delta: the Postgres
# credentials Secret is authentik-postgresql-creds (bitnami subchart existingSecret)
# instead of RKE2's chart-generated authentik-postgresql.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: authentik-db-backup
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: backup
spec:
  schedule: "45 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: authentik
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: pg-backup
              image: docker.io/library/postgres:17.10-bookworm
              imagePullPolicy: IfNotPresent
              command: ["/bin/bash", "-ceuo", "pipefail"]
              args:
                - |
                  ts="$(date +%Y%m%d-%H%M%S)"
                  out="/backup/authentik-${ts}.sql.gz"
                  echo "dumping to ${out}"
                  pg_dump -h authentik-postgresql -U authentik -d authentik | gzip > "${out}"
                  gzip -t "${out}"
                  size="$(stat -c %s "${out}")"
                  if [ "${size}" -lt 1024 ]; then echo "dump suspiciously small (${size} bytes)" >&2; exit 1; fi
                  echo "backup OK: ${size} bytes"
                  find /backup -name "authentik-*.sql.gz" -mtime +14 -delete
                  ls -la /backup | tail -5
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: authentik-postgresql-creds
                      key: password
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits: { memory: 512Mi }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - { name: backup, mountPath: /backup }
                - { name: tmp, mountPath: /tmp }
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: authentik-backups
            - name: tmp
              emptyDir:
                sizeLimit: 128Mi
