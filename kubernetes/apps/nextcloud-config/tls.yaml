# Self-signed TLS for the Nextcloud Gateway — fully self-contained (no ACME/DNS deps).
# Swap `issuerRef` to a Let's Encrypt ClusterIssuer later (pure git change) once one exists;
# browsers warn on self-signed until then, but Secure cookies / https login work.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nextcloud-gateway-tls
  namespace: nextcloud
spec:
  secretName: nextcloud-gateway-tls
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  commonName: "*.alaras.net"
  dnsNames:
    # X.509 wildcards only cover ONE label (unlike Gateway API listeners),
    # so both levels are needed for cloud.talos.alaras.net to verify.
    - "*.alaras.net"
    - "*.talos.alaras.net"
    - alaras.net
  duration: 8760h # 1y; cert-manager auto-renews
