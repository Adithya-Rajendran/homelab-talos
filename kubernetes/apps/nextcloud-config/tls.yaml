# Wildcard TLS for the *.alaras.net Gateway — Let's Encrypt via DNS-01/Cloudflare,
# mirroring RKE2's gateway/wildcard-tls (*.rke.alaras.net). Issuers + sealed token
# live in kubernetes/apps/cert-manager-config/. secretName is unchanged from the
# earlier self-signed cert, so the Gateway listener needed no edit — cert-manager
# reissues into the same Secret.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nextcloud-gateway-tls
  namespace: nextcloud
spec:
  secretName: nextcloud-gateway-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
  commonName: "*.alaras.net"
  dnsNames:
    - "*.alaras.net"
  usages:
    - digital signature
    - key encipherment
