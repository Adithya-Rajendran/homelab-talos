# Applies the cephx SealedSecret (csi-rbd-secret) for ceph-csi-rbd. Until you commit
# kubernetes/apps/ceph-csi-rbd/csi-rbd-secret.sealedsecret.yaml this app simply has nothing to
# sync; once it's there, the sealed-secrets controller unseals it into a real Secret and RBD
# provisioning starts working. sync-wave before the driver so the secret exists first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ceph-csi-rbd-secret
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: talos-homelab
  source:
    repoURL: https://github.com/Adithya-Rajendran/homelab-talos.git
    targetRevision: main
    path: kubernetes/apps/ceph-csi-rbd
  destination:
    server: https://kubernetes.default.svc
    namespace: ceph-csi-rbd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
