# NFS CSI driver (mirrors RKE2's kube-system install, default values).
# Runs in kube-system: the node plugin needs privileged, and kube-system is
# PSA-exempt on Talos. StorageClasses live in the storage-nfs app.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: csi-driver-nfs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: talos-homelab
  source:
    repoURL: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts
    chart: csi-driver-nfs
    targetRevision: 4.13.4
    helm:
      releaseName: csi-driver-nfs
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
