# Sealed Secrets controller — the in-cluster secrets mechanism for Argo CD (SOPS doesn't
# decrypt natively under Argo). Encrypt secrets with `kubeseal` and commit the SealedSecret;
# the controller decrypts them in-cluster. Vendored manifest (the Bitnami helm repo was retired).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: talos-homelab
  source:
    repoURL: https://github.com/Adithya-Rajendran/homelab-talos.git
    targetRevision: main
    path: kubernetes/apps/sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
